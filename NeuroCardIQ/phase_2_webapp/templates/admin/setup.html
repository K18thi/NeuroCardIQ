<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Admin Setup — NeuroCardiQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f0f7ff;
     min-height:100vh;display:flex;align-items:center;
     justify-content:center;padding:40px 20px}
.card{background:#fff;border-radius:20px;padding:40px 36px;
      border:1px solid #cce0f5;
      box-shadow:0 8px 32px rgba(26,111,189,0.1);
      width:100%;max-width:440px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:1.5rem;color:#1a6fbd;font-weight:600}
.warn{background:#fff8e8;border:1px solid #f5d080;border-radius:12px;
      padding:14px 16px;color:#b07a10;font-size:0.85rem;margin-bottom:20px}
h2{font-size:1.15rem;color:#1a2a3a;margin-bottom:20px;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.78rem;color:#5d7fa3;
                  margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 14px;border-radius:10px;
                  border:1px solid #cce0f5;background:#f9fcff;
                  font-size:0.92rem;outline:none;font-family:inherit;
                  color:#1a2a3a;transition:all 0.2s}
.form-group input:focus{border-color:#1a6fbd;
                         box-shadow:0 0 0 3px rgba(26,111,189,0.1)}
.btn{width:100%;padding:13px;
     background:linear-gradient(135deg,#5aa9e6,#1a6fbd);
     color:#fff;border:none;border-radius:10px;font-size:1rem;
     font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.error{background:#fff0f0;border:1px solid #f5c0c0;border-radius:10px;
       padding:12px 16px;color:#c03030;font-size:0.85rem;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🧠 NeuroCardiQ</h1>
  </div>
  <div class="warn">
    ⚠️ <strong>One-time setup.</strong> This page will be
    disabled after the first admin is created.
  </div>
  <h2>Create Admin Account</h2>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Admin Name</label>
      <input type="text" name="name"
             placeholder="System Admin" required/>
    </div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" name="email"
             placeholder="admin@neurocardiq.com" required/>
    </div>
    <div class="form-group">
      <label>Password (min 8 chars)</label>
      <input type="password" name="password"
             placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn">
      Create Admin Account →
    </button>
  </form>
</div>
</body>
</html>
