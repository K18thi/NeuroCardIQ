<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Admin Login — NeuroCardiQ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Poppins',sans-serif;
  background:#f0f7ff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px
}

.card{
  background:#fff;
  border-radius:20px;
  padding:40px 36px;
  border:1px solid #cce0f5;
  box-shadow:0 8px 32px rgba(26,111,189,0.1);
  width:100%;
  max-width:400px
}

.logo{text-align:center;margin-bottom:28px}

.logo h1{font-size:1.5rem;color:#1a6fbd;font-weight:600}

.logo p{color:#7aaac8;font-size:0.85rem;margin-top:4px}

.admin-badge{
  display:inline-block;
  background:#e0f0ff;
  color:#1a6fbd;
  padding:4px 14px;
  border-radius:20px;
  font-size:0.75rem;
  font-weight:600;
  margin-top:8px;
  letter-spacing:1px
}

h2{font-size:1.2rem;color:#1a2a3a;margin-bottom:20px}

.form-group{margin-bottom:16px}

.form-group label{
  display:block;
  font-size:0.78rem;
  color:#5d7fa3;
  margin-bottom:6px;
  font-weight:500
}

.form-group input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #cce0f5;
  background:#f9fcff;
  font-size:0.92rem;
  outline:none;
  font-family:inherit;
  color:#1a2a3a;
  transition:all 0.2s
}

.form-group input:focus{
  border-color:#1a6fbd;
  box-shadow:0 0 0 3px rgba(26,111,189,0.1)
}

.btn{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,#5aa9e6,#1a6fbd);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.2s;
  margin-top:8px
}

.btn:hover{
  opacity:0.9;
  transform:translateY(-1px)
}

.error{
  background:#fff0f0;
  border:1px solid #f5c0c0;
  border-radius:10px;
  padding:12px 16px;
  color:#c03030;
  font-size:0.85rem;
  margin-bottom:16px
}

.success{
  background:#e8fff4;
  border:1px solid #9fe1cb;
  color:#1a8a5a
}

.back{
  text-align:center;
  margin-top:16px;
  font-size:0.85rem;
  color:#7aaac8
}

.back a{
  color:#1a6fbd;
  text-decoration:none;
  font-weight:500
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <h1>🧠 NeuroCardiQ</h1>
    <p>System Administration</p>
    <span class="admin-badge">🔐 ADMIN ACCESS</span>
  </div>

  <h2>Admin Sign In</h2>

  {% if error %}
    <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="error {% if cat == 'success' %}success{% endif %}">
        {{ msg }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">

    <div class="form-group">
      <label>Admin Email</label>
      <input type="text" name="identifier"
             placeholder="admin@neurocardiq.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password"
             placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn">
      Sign In as Admin →
    </button>

  </form>

  <div class="back">
    <a href="/signin">← Back to User Login</a>
  </div>

</div>

</body>
</html>
