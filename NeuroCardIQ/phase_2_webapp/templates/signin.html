<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Mental Health Risk Assessment</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo h1 { font-size: 1.6rem; color: #7eb8f7; }
.logo p  { color: #666; font-size: 0.85rem; margin-top: 6px; }

.card {
  background: #1a1f2e;
  border-radius: 20px;
  padding: 36px 32px;
  border: 1px solid #2a2f45;
}
.card h2 {
  font-size: 1.3rem;
  margin-bottom: 24px;
  color: #fff;
}

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 0.82rem;
  color: #888;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  background: #0f1117;
  border: 1px solid #2a2f45;
  border-radius: 10px;
  color: #e0e0e0;
  font-size: 0.95rem;
  transition: border-color 0.2s;
  outline: none;
}
.form-group input:focus { border-color: #7eb8f7; }

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 20px;
}
.remember input { width: auto; }

.btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #1e3a6e, #2563b0);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: linear-gradient(135deg, #2563b0, #3b82f6); }

.divider {
  text-align: center;
  color: #444;
  margin: 20px 0;
  font-size: 0.82rem;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 42%;
  height: 1px;
  background: #2a2f45;
}
.divider::before { left: 0; }
.divider::after  { right: 0; }

.link-row {
  text-align: center;
  font-size: 0.88rem;
  color: #666;
}
.link-row a { color: #7eb8f7; text-decoration: none; }
.link-row a:hover { text-decoration: underline; }

.alert {
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 18px;
  font-size: 0.88rem;
}
.alert-error   { background: #2d1515; color: #f87171; border: 1px solid #7f1d1d; }
.alert-success { background: #1a3a2a; color: #34d399; border: 1px solid #065f46; }
.alert-info    { background: #1e2a45; color: #7eb8f7; border: 1px solid #1e3a6e; }

.flashes { margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <h1>🧠 Mental Health Risk</h1>
    <p>EEG + ECG Brain-Heart Analysis</p>
  </div>

  <div class="card">
    <h2>Welcome back 👋</h2>

    <!-- Flash messages -->
    <div class="flashes">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
    </div>

    <!-- Error -->
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signin">
      <div class="form-group">
        <label>Email or Phone Number</label>
        <input type="text" name="identifier" placeholder="you@email.com or +91xxxxxxxxxx"
               required autocomplete="username"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••"
               required autocomplete="current-password"/>
      </div>

      <div class="remember">
        <input type="checkbox" name="remember" id="remember"/>
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <div class="link-row">
      Don't have an account?
      <a href="/signup">Create one</a>
    </div>
  </div>

</div>
</body>
</html>
